{% extends "base.html" %}
{% block title %}注册 — 云感天气{% endblock %}

{% block content %}
<div class="auth-shell">
  <div class="auth-card">
    <h1>注册</h1>
    <p class="hint" style="margin:0;">用户名 3～32 位字母数字下划线；密码至少 8 位</p>
    {% if error %}<p class="err">{{ error }}</p>{% endif %}
    <form method="post" action="{{ url_for('register') }}">
      <label>用户名<input type="text" name="username" required autocomplete="username" /></label>
      <label>密码<input type="password" name="password" required autocomplete="new-password" /></label>
      <label>确认密码<input type="password" name="password2" required autocomplete="new-password" /></label>
      <button type="submit">注册并登录</button>
    </form>
    <p class="hint">已有账号？<a href="{{ url_for('login') }}">登录</a></p>
    <p class="hint"><a href="{{ url_for('index') }}">← 返回首页</a></p>
  </div>
</div>
{% endblock %}
