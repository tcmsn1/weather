{% extends "base.html" %}
{% block title %}登录 — 云感天气{% endblock %}

{% block content %}
<div class="auth-shell">
  <div class="auth-card">
    <h1>登录</h1>
    <p class="hint" style="margin:0;">使用账号管理你的气象站设备</p>
    {% if error %}<p class="err">{{ error }}</p>{% endif %}
    <form method="post" action="{{ url_for('login') }}">
      {% if request.args.get('next') %}
      <input type="hidden" name="next" value="{{ request.args.get('next') }}" />
      {% endif %}
      <label>用户名<input type="text" name="username" required autocomplete="username" /></label>
      <label>密码<input type="password" name="password" required autocomplete="current-password" /></label>
      <button type="submit">登录</button>
    </form>
    <p class="hint">还没有账号？<a href="{{ url_for('register') }}">注册</a></p>
    <p class="hint"><a href="{{ url_for('index') }}">← 返回首页看天气预报</a></p>
  </div>
</div>
{% endblock %}
